<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Memories tab</title>

<style>

/* RESET */
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

/* HEADER */
header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 20px;
background:black;
position:relative;
}

header img{
height:60px;
}

/* MENU BUTTON */
.menu-btn{
font-size:26px;
color:white;
display:none;
cursor:pointer;
}

/* NAV */
nav ul{
display:flex;
list-style:none;
gap:15px;
}

nav a{
text-decoration:none;
color:white;
font-size:16px;
}

/* MOBILE NAV */
@media(max-width:768px){

.menu-btn{
display:block;
}

nav{
position:absolute;
top:60px;
left:0;
width:100%;
background:black;
display:none;
}

nav ul{
flex-direction:column;
text-align:center;
padding:10px 0;
}

nav.active{
display:block;
}

}

/* GALLERY */
.gallery{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:20px;
padding:30px;
background:#f4f4f4;
}

/* CARD */
.card{
background:white;
padding:10px;
border-radius:10px;
box-shadow:0 5px 10px rgba(0,0,0,0.2);
text-align:center;
transition:0.3s;
}

.card:hover{
transform:scale(1.05);
}

.card img{
width:100%;
height:220px;
object-fit:cover;
border-radius:10px;
}

.card h3{
font-size:14px;
margin-top:5px;
}

/* FOOTER */
footer{
background:black;
color:white;
text-align:center;
padding:15px;
}

footer a{
color:white;
text-decoration:none;
}

/* 🔥 MOBILE RESPONSIVE */
@media(max-width:768px){

.gallery{
grid-template-columns:repeat(2,1fr);
gap:10px;
padding:15px;
}

.card img{
height:150px;
}

}

@media(max-width:480px){

.gallery{
grid-template-columns:1fr;
}

}

</style>

</head>

<body>

<header>

<img src="logo.jpg.jpeg">

<div class="menu-btn" onclick="toggleMenu()">☰</div>

<nav id="nav">
<ul>

<li><a href="surprise.html">Surprise</a></li>

</ul>
</nav>

</header>

<main>

<div class="card"><img src="we1.jpeg"><h3>💖</h3></div>
<div class="card"><img src="we2.jpeg"><h3>💖</h3></div>
<div class="card"><img src="we3.jpeg"><h3>💖</h3></div>
<div class="card"><img src="we4.jpeg"><h3>💖</h3></div>
<div class="card"><img src="we5.jpeg"><h3>💖</h3></div>
<div class="card"><img src="we6.jpeg"><h3>💖</h3></div>
<div class="card"><img src="we7.jpeg"><h3>💖</h3></div>
<div class="card"><img src="we8.jpeg"><h3>💖</h3></div>
<div class="card"><img src="we9.jpeg"><h3>💖</h3></div>
<div class="card"><img src="we10.jpeg"><h3>💖</h3></div>
<div class="card"><img src="we11.jpeg"><h3>💖</h3></div>
<div class="card"><img src="we12.jpeg"><h3>💖</h3></div>

</section>

</main>

<footer>
<a href="https://instagram.com">Instagram</a>
</footer>

<script>
function toggleMenu(){
document.getElementById("nav").classList.toggle("active");
}
</script>

</body>
</html>
