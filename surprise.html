<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday Surprise</title>

<style>

/* RESET */
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

/* HEADER */
header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 20px;
background:black;
position:relative;
}

header img{
height:60px;
}

/* MENU BUTTON */
.menu-btn{
font-size:28px;
color:white;
display:none;
cursor:pointer;
}

/* NAV */
nav ul{
display:flex;
list-style:none;
gap:20px;
}

nav a{
text-decoration:none;
color:white;
font-size:16px;
}

/* MOBILE NAV */
@media(max-width:768px){

.menu-btn{
display:block;
}

nav{
position:absolute;
top:70px;
left:0;
width:100%;
background:black;
display:none;
}

nav ul{
flex-direction:column;
text-align:center;
padding:10px 0;
}

nav.active{
display:block;
}

}

/* BODY */
body{
min-height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#ff5f9e,#ffc3a0);
text-align:center;
color:white;
}

/* CONTENT */
h1{
font-size:40px;
margin-top:20px;
}

/* GIFT */
.gift-box{
font-size:100px;
cursor:pointer;
transition:0.3s;
animation:shake 2s infinite;
}

.gift-box:active{
transform:scale(1.2);
}

@keyframes shake{
0%{transform:rotate(0)}
25%{transform:rotate(5deg)}
50%{transform:rotate(-5deg)}
75%{transform:rotate(5deg)}
100%{transform:rotate(0)}
}

/* CAKE */
.cake{
font-size:70px;
display:none;
margin-top:15px;
animation:bounce 2s infinite;
}

@keyframes bounce{
0%,100%{transform:translateY(0)}
50%{transform:translateY(-15px)}
}

/* MESSAGE */
.message{
display:none;
font-size:24px;
margin-top:20px;
padding:0 15px;
}

/* HEART */
.heart{
position:absolute;
font-size:20px;
animation:float linear infinite;
}

@keyframes float{
0%{
transform:translateY(100vh);
opacity:0;
}
50%{opacity:1;}
100%{
transform:translateY(-10vh);
opacity:0;
}
}

/* MOBILE EXTRA */
@media(max-width:768px){

h1{
font-size:26px;
}

.gift-box{
font-size:80px;
}

.cake{
font-size:60px;
}

.message{
font-size:18px;
}

}

</style>

</head>

<body>

<header>

<img src="logo.jpg.jpeg">

<div class="menu-btn" onclick="toggleMenu()">☰</div>

<nav id="nav">
<ul>
<li><a href="index.html">Home</a></li>
<li><a href="memories.html">Memories</a></li>
<li><a href="message.html">Message</a></li>
<li><a href="surprise.html">Surprise</a></li>
<li><a href="game.html">Game</a></li>
</ul>
</nav>

</header>

<h1>Click the Gift for Your Surprise 🎁</h1>

<div class="gift-box" onclick="openGift()">🎁</div>

<div class="cake" id="cake">🎂</div>

<div class="message" id="message">
🎉 Happy Birthday My Love 💖 <br>
You are the most beautiful part of my life. <br>
I love you forever ❤️
</div>

<script>

function toggleMenu(){
document.getElementById("nav").classList.toggle("active");
}

function openGift(){

document.querySelector(".gift-box").style.display="none";
document.getElementById("cake").style.display="block";
document.getElementById("message").style.display="block";

/* hearts */
for(let i=0;i<20;i++){

let heart=document.createElement("div");
heart.className="heart";
heart.innerHTML="💖";

heart.style.left=Math.random()*100+"vw";
heart.style.animationDuration=(3+Math.random()*3)+"s";

document.body.appendChild(heart);

}

}

</script>

</body>
</html>
