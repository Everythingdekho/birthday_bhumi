<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday Surprise</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#ff5f9e,#ffc3a0);
overflow:hidden;
text-align:center;
color:white;
}

/* HEADER */

header{
position:absolute;
top:0;
width:100%;
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 40px;
background:black;
}

header ul{
display:flex;
gap:20px;
list-style:none;
}

header a{
color:white;
text-decoration:none;
}

/* GIFT BOX */

.gift-box{
font-size:120px;
cursor:pointer;
transition:0.5s;
animation:shake 2s infinite;
}

.gift-box:hover{
transform:scale(1.2);
}

@keyframes shake{
0%{transform:rotate(0)}
25%{transform:rotate(5deg)}
50%{transform:rotate(-5deg)}
75%{transform:rotate(5deg)}
100%{transform:rotate(0)}
}

/* MESSAGE */

.message{
display:none;
font-size:35px;
margin-top:30px;
animation:fade 2s ease;
}

@keyframes fade{
from{opacity:0; transform:translateY(40px)}
to{opacity:1; transform:translateY(0)}
}

/* CAKE */

.cake{
font-size:80px;
display:none;
margin-top:20px;
animation:bounce 2s infinite;
}

@keyframes bounce{
0%,100%{transform:translateY(0)}
50%{transform:translateY(-20px)}
}

/* HEARTS */

.heart{
position:absolute;
font-size:20px;
animation:float 6s linear infinite;
}

@keyframes float{
0%{
transform:translateY(100vh);
opacity:0;
}
50%{
opacity:1;
}
100%{
transform:translateY(-10vh);
opacity:0;
}
}

</style>

</head>

<body>

<header>

<div>
<img src="logo.jpg.jpeg" height="80">
</div>

<ul>
<li><a href="index.html">Home</a></li>
<li><a href="memories.html">Memories</a></li>
<li><a href="message.html">Message</a></li>
<li><a href="surprise.html">Surprise</a></li>
</ul>

</header>

<h1>Click the Gift for Your Surprise 🎁</h1>

<div class="gift-box" onclick="openGift()">
🎁
</div>

<div class="cake" id="cake">
🎂
</div>

<div class="message" id="message">
🎉 Happy Birthday My Love 💖 <br>
You are the most beautiful part of my life. <br>
I love you forever ❤️
</div>

<script>

function openGift(){

document.querySelector(".gift-box").style.display="none";

document.getElementById("cake").style.display="block";

document.getElementById("message").style.display="block";

/* hearts animation */

for(let i=0;i<50;i++){

let heart=document.createElement("div");

heart.className="heart";

heart.innerHTML="💖";

heart.style.left=Math.random()*100+"vw";

heart.style.animationDuration=(3+Math.random()*3)+"s";

document.body.appendChild(heart);

}

}

</script>

</body>
</html>
