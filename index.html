<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HAPPY BIRTHDAY JI</title>

<style>

/* RESET */
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

/* HEADER */
header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 20px;
background:black;
position:relative;
z-index:1000;
}

header img{
height:60px;
}

/* MENU BUTTON */
.menu-btn{
font-size:28px;
color:white;
display:none;
cursor:pointer;
}

/* NAV */
nav{
transition:0.3s;
}

nav ul{
display:flex;
list-style:none;
gap:20px;
}

nav a{
text-decoration:none;
color:white;
font-size:16px;
transition:0.3s;
}

nav a:hover{
color:#ff4d6d;
}

/* HERO */
.hero{
height:75vh;
background:url("bcn.jpeg") no-repeat center/cover;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
color:white;
position:relative;
padding:20px;
}

.hero::before{
content:"";
position:absolute;
top:0;
left:0;
height:100%;
width:100%;
background:rgba(0,0,0,0.5);
}

.hero h1{
font-size:50px;
z-index:1;
}

.hero h2{
font-size:28px;
margin-top:10px;
z-index:1;
}

/* GALLERY */
.gallery{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:20px;
padding:30px;
background:#f4f4f4;
}

.card{
background:white;
padding:10px;
border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
text-align:center;
transition:0.3s;
}

.card:hover{
transform:translateY(-5px);
}

.card img{
width:100%;
height:220px;
object-fit:cover;
border-radius:10px;
}

/* FOOTER */
footer{
background:black;
color:white;
text-align:center;
padding:15px;
}

footer a{
color:#ff4d6d;
text-decoration:none;
font-weight:bold;
}

/* 🔥 MOBILE RESPONSIVE */
@media(max-width:768px){

.menu-btn{
display:block;
}

/* NAV DROPDOWN */
nav{
position:absolute;
top:70px;
left:0;
width:100%;
background:black;
display:none;
z-index:999;
}

nav ul{
flex-direction:column;
text-align:center;
padding:15px 0;
gap:15px;
}

/* show menu */
nav.active{
display:block;
}

/* HERO TEXT */
.hero h1{
font-size:28px;
}

.hero h2{
font-size:18px;
}

/* GALLERY */
.gallery{
grid-template-columns:repeat(2,1fr);
padding:15px;
gap:10px;
}

.card img{
height:150px;
}

}

/* EXTRA SMALL DEVICES */
@media(max-width:480px){
.gallery{
grid-template-columns:1fr;
}
}

</style>

</head>

<body>
