<!DOCTYPE html>
<html>
<head>
  <title>Snake Game 🐍</title>
  <style>
    body {
      text-align:center;
      background:black;
      color:white;
    }

    canvas {
      background:white;
    }

    .controls button {
      font-size:20px;
      margin:5px;
      padding:10px 15px;
    }
  </style>
</head>

<body>

<h2>Snake Game 🐍</h2>

<canvas id="c" width="420" height="420"></canvas>

<div class="controls">
  <br>
  <button onclick="up()">⬆️</button><br>
  <button onclick="left()">⬅️</button>
  <button onclick="down()">⬇️</button>
  <button onclick="right()">➡️</button>
</div>

<script>
let c = document.getElementById("c");
let ctx = c.getContext("2d");

// 🔥 BOX SIZE (snake bada ho gaya)
let box = 400;

// images
let snakeImg = new Image();
snakeImg.src = "snake1.png";

let foodImg = new Image();
foodImg.src = "food1.jpg";

let snake = [{x:10, y:10}];
let dx = 1;
let dy = 0;
let food = {x:5, y:5};

// wait for images load
snakeImg.onload = foodImg.onload = function(){
  setInterval(game,150);
};

// keyboard
document.addEventListener("keydown", (e)=>{
  if(e.key=="ArrowUp") up();
  if(e.key=="ArrowDown") down();
  if(e.key=="ArrowLeft") left();
  if(e.key=="ArrowRight") right();
});

// controls
function up(){ if(dy!=1){dx=0;dy=-1;} }
function down(){ if(dy!=-1){dx=0;dy=1;} }
function left(){ if(dx!=1){dx=-1;dy=0;} }
function right(){ if(dx!=-1){dx=1;dy=0;} }

function game(){
  ctx.clearRect(0,0,420,420);

  let head = {
    x: snake[0].x + dx,
    y: snake[0].y + dy
  };

  // eat food
  if(head.x==food.x && head.y==food.y){
    food = {
      x: Math.floor(Math.random()*14),
      y: Math.floor(Math.random()*14)
    };
  } else {
    snake.pop();
  }

  snake.unshift(head);

  // draw snake 🐍
  snake.forEach(s=>{
    ctx.drawImage(snakeImg, s.x*box, s.y*box, box, box);
  });

  // draw food 🍎
  ctx.drawImage(foodImg, food.x*box, food.y*box, box, box);

  // collision
  if(head.x<0 || head.y<0 || head.x>=14 || head.y>=14){
    alert("Game Over 🎂");
    resetGame();
  }
}

function resetGame(){
  snake=[{x:7,y:7}];
  dx=1;
  dy=0;
}
</script>

</body>
</html>
