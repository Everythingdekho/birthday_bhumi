<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Games 🎮</title>

<style>

/* RESET */
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

/* HEADER */
header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 40px;
background:black;
}

header ul{
display:flex;
list-style:none;
gap:20px;
}

header a{
text-decoration:none;
color:white;
font-size:18px;
}

/* MAIN */
main{
text-align:center;
padding:40px;
background:#f4f4f4;
min-height:80vh;
}

main h1{
font-size:40px;
margin-bottom:30px;
}

/* GAME CARDS */
.games{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:30px;
}

.game-card{
background:white;
padding:15px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
transition:0.3s;
width:250px;
}

.game-card:hover{
transform:scale(1.05);
}

.game-card img{
width:100%;
height:200px;
object-fit:cover;
border-radius:10px;
}

.game-card a{
display:inline-block;
margin-top:10px;
padding:8px 15px;
background:black;
color:white;
text-decoration:none;
border-radius:8px;
}

.game-card a:hover{
background:#333;
}

/* FOOTER */
footer{
background:black;
color:white;
text-align:center;
padding:20px;
}

</style>

</head>

<body>

<header>

<div>
<img src="logo.jpg.jpeg" height="100">
</div>

</ul>

</header>

<main>

<div class="games">

<div class="game-card">
<img src="balloon.jpg" alt="Balloon Game">
<a href="ballongame.html">Play Balloon Game 🎈</a>
</div>

<div class="game-card">
<img src="snakegame.jpg" alt="Snake Game">
<a href="snake.html">Play Snake Game 🐍</a>
</div>

<div class="game-card">
<img src="gunbottle.webp" alt="Gun Bottle Game">
<a href="shooting.html">Play Gun Bottle Game 🔫</a>
</div>

</div>

</main>

<footer>
<p>Made with 💖 for someone special</p>
</footer>

</body>
</html>
