<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Games 🎮</title>

<style>

/* RESET */
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

/* HEADER */
header{
display:flex;
justify-content:space-between;
align-items:center;
padding:12px 20px;
background:black;
position:relative;
}

header img{
height:60px;
}

/* MENU */
.menu-btn{
font-size:26px;
color:white;
display:none;
cursor:pointer;
}

nav ul{
display:flex;
list-style:none;
gap:15px;
}

nav a{
text-decoration:none;
color:white;
font-size:16px;
}

/* MOBILE NAV */
@media(max-width:768px){

.menu-btn{
display:block;
}

nav{
position:absolute;
top:60px;
left:0;
width:100%;
background:black;
display:none;
}

nav ul{
flex-direction:column;
text-align:center;
padding:10px 0;
}

nav.active{
display:block;
}

}

/* MAIN */
main{
text-align:center;
padding:30px 15px;
background:#f4f4f4;
min-height:80vh;
}

main h1{
font-size:32px;
margin-bottom:25px;
}

/* GAMES GRID */
.games{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:25px;
}

/* CARD */
.game-card{
background:white;
padding:12px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
transition:0.3s;
}

.game-card:hover{
transform:scale(1.05);
}

.game-card img{
width:100%;
height:180px;
object-fit:cover;
border-radius:10px;
}

.game-card a{
display:inline-block;
margin-top:10px;
padding:8px 15px;
background:black;
color:white;
text-decoration:none;
border-radius:8px;
font-size:14px;
}

/* FOOTER */
footer{
background:black;
color:white;
text-align:center;
padding:15px;
}

/* 🔥 RESPONSIVE */
@media(max-width:768px){

.games{
grid-template-columns:repeat(2,1fr);
gap:15px;
}

}

@media(max-width:480px){

.games{
grid-template-columns:1fr;
}

main h1{
font-size:24px;
}

}

</style>

</head>

<body>

<header>

<img src="logo.jpg.jpeg">

<div class="menu-btn" onclick="toggleMenu()">☰</div>

<nav id="nav">
<ul>
<li><a href="index.html">Home</a></li>
<li><a href="memories.html">Memories</a></li>
<li><a href="message.html">Message</a></li>
<li><a href="surprise.html">Surprise</a></li>
<li><a href="game.html">Game</a></li>
</ul>
</nav>

</header>

<main>

<h1>🎮 Birthday Games Zone 🎮</h1>

<div class="games">

<div class="game-card">
<img src="balloon.jpg">
<a href="ballongame.html">Play Balloon Game 🎈</a>
</div>

<div class="game-card">
<img src="snakegame.jpg">
<a href="snake.html">Play Snake Game 🐍</a>
</div>

<div class="game-card">
<img src="gunbottle.webp">
<a href="shooting.html">Play Gun Bottle Game 🔫</a>
</div>

<div class="game-card">
<img src="cargame.jpg">
<a href="car.html">Play Car Enemy Game 🚗</a>
</div>

</div>

</main>

<footer>
<p>Made with 💖 for someone special</p>
</footer>

<script>
function toggleMenu(){
document.getElementById("nav").classList.toggle("active");
}
</script>

</body>
</html>
